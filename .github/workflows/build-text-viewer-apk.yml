name: Build text viewer APK

on:
  workflow_dispatch:
  push:
    branches: [claude/text-viewer-voice-reading-rlk034]
    paths:
      - 'text-viewer-app/**'
      - '.github/workflows/build-text-viewer-apk.yml'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: text-viewer-app
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: text-viewer-app/package-lock.json

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK (debug-signed)
        working-directory: text-viewer-app/android
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk text-viewer-voice.apk

      - name: Publish APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: text-viewer-apk
          name: 말하는 텍스트뷰어 (Android APK)
          prerelease: true
          body: |
            txt 파일을 열어 읽고 음성(TTS)으로 들을 수 있는 텍스트 뷰어 앱입니다.

            **폰에서 설치 방법 (Android)**
            1. 아래 `text-viewer-voice.apk`를 눌러 다운로드
            2. 다운로드한 파일을 열면 "출처를 알 수 없는 앱" 허용을 물어봅니다 → 허용
            3. 설치 후 "말하는 텍스트뷰어" 앱 실행

            ※ 테스트용 빌드(디버그 서명)라 Play 스토어 배포용은 아닙니다.
          files: text-viewer-app/text-viewer-voice.apk
