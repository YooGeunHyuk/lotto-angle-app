name: Update lotto data

on:
  workflow_dispatch:
  schedule:
    # KST 토 20:40(추첨 직후 1순위) + 토 21:30 백업 + 일 09:00 백업 — 네이버 반영 늦어도 놓치지 않게 3회.
    - cron: '40 11 * * 6'
    - cron: '30 12 * * 6'
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  update-lotto-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest draw data
        run: npm run update:lotto

      - name: Sync Gist (Naver scrape → Gist API)
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: npm run update:gist

      - name: Commit updated draw database
        run: |
          if git diff --quiet -- data/lotto_history.json; then
            echo "No new lotto data."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lotto_history.json
          git commit -m "Update lotto draw database"
          git push
