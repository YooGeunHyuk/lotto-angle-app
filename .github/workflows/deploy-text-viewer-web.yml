name: Deploy text viewer web

on:
  workflow_dispatch:
  push:
    branches: [claude/text-viewer-voice-reading-rlk034]
    paths:
      - 'text-viewer-app/**'
      - '.github/workflows/deploy-text-viewer-web.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: text-viewer-app
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: text-viewer-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Export web build
        run: npx expo export --platform web

      - name: Prepare Pages output
        run: node scripts/prepare-pages.js

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: text-viewer-app/dist

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
